<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monkey Sketch</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #182327;
      --paper: #f7f9fb;
      --accent: #0f8b8d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      letter-spacing: 0;
      overflow: hidden;
    }

    main {
      min-height: 100vh;
    }

    button {
      appearance: none;
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 2;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--ink);
      color: white;
      cursor: pointer;
      font: inherit;
      min-height: 42px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: var(--accent);
      border-color: var(--accent);
    }

    .stage {
      position: relative;
      overflow: hidden;
      background: var(--paper);
      width: 100vw;
      height: 100vh;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    img {
      display: none;
    }

    @media (max-width: 720px) {
      button {
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <main>
    <button id="restartButton" type="button">Replay</button>
    <audio id="monkeySound" src="faaah.mp3" preload="auto" autoplay></audio>
    <section class="stage" aria-label="Animated monkey sketch canvas">
      <img id="monkeyImage" src="Monkey.jpeg" alt="">
      <canvas id="sketchCanvas"></canvas>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#sketchCanvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const monkeyImage = document.querySelector("#monkeyImage");
    const monkeySound = document.querySelector("#monkeySound");
    const sketchDuration = 4000;
    const soundDelay = 1000;
    const restartButton = document.querySelector("#restartButton");

    const state = {
      image: null,
      points: [],
      animationId: 0,
      soundTimerId: 0,
      soundScheduled: false,
      soundBlocked: false,
      imageRect: { x: 0, y: 0, width: 0, height: 0 },
      startedAt: 0
    };

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * scale));
      canvas.height = Math.max(1, Math.floor(rect.height * scale));
      ctx.setTransform(scale, 0, 0, scale, 0, 0);

      if (state.image) {
        prepareSketch(state.image);
      } else {
        drawEmptyState();
      }
    }

    function drawEmptyState() {
      const { width, height } = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#f7f9fb";
      ctx.fillRect(0, 0, width, height);
    }

    function getImageRect(image, width, height) {
      const padding = Math.min(width, height) * 0.02;
      const availableWidth = Math.max(1, width - padding * 2);
      const availableHeight = Math.max(1, height - padding * 2);
      const imageRatio = image.naturalWidth / image.naturalHeight;
      const boxRatio = availableWidth / availableHeight;
      let drawWidth = availableWidth;
      let drawHeight = availableHeight;

      if (imageRatio > boxRatio) {
        drawHeight = drawWidth / imageRatio;
      } else {
        drawWidth = drawHeight * imageRatio;
      }

      return {
        x: (width - drawWidth) / 2,
        y: (height - drawHeight) / 2,
        width: drawWidth,
        height: drawHeight
      };
    }

    function prepareSketch(image) {
      cancelAnimationFrame(state.animationId);
      clearTimeout(state.soundTimerId);
      monkeySound.pause();
      monkeySound.currentTime = 0;
      state.soundScheduled = false;
      state.soundBlocked = false;
      const { width, height } = canvas.getBoundingClientRect();
      state.imageRect = getImageRect(image, width, height);

      const sampleCanvas = document.createElement("canvas");
      const sampleCtx = sampleCanvas.getContext("2d", { willReadFrequently: true });
      const sampleSize = 170;
      const ratio = image.naturalWidth / image.naturalHeight;
      sampleCanvas.width = ratio >= 1 ? sampleSize : Math.max(80, Math.round(sampleSize * ratio));
      sampleCanvas.height = ratio >= 1 ? Math.max(80, Math.round(sampleSize / ratio)) : sampleSize;
      sampleCtx.drawImage(image, 0, 0, sampleCanvas.width, sampleCanvas.height);

      let pixels;
      try {
        pixels = sampleCtx.getImageData(0, 0, sampleCanvas.width, sampleCanvas.height).data;
      } catch (error) {
        state.points = [];
        state.startedAt = 0;
        drawFrame(0);
        state.animationId = requestAnimationFrame(animateSketch);
        return;
      }

      const points = [];

      for (let y = 1; y < sampleCanvas.height - 1; y += 2) {
        for (let x = 1; x < sampleCanvas.width - 1; x += 2) {
          const i = (y * sampleCanvas.width + x) * 4;
          const r = pixels[i];
          const g = pixels[i + 1];
          const b = pixels[i + 2];
          const a = pixels[i + 3];
          const brightness = (r + g + b) / 3;
          const left = (pixels[(y * sampleCanvas.width + x - 1) * 4] + pixels[(y * sampleCanvas.width + x - 1) * 4 + 1] + pixels[(y * sampleCanvas.width + x - 1) * 4 + 2]) / 3;
          const right = (pixels[(y * sampleCanvas.width + x + 1) * 4] + pixels[(y * sampleCanvas.width + x + 1) * 4 + 1] + pixels[(y * sampleCanvas.width + x + 1) * 4 + 2]) / 3;
          const up = (pixels[((y - 1) * sampleCanvas.width + x) * 4] + pixels[((y - 1) * sampleCanvas.width + x) * 4 + 1] + pixels[((y - 1) * sampleCanvas.width + x) * 4 + 2]) / 3;
          const down = (pixels[((y + 1) * sampleCanvas.width + x) * 4] + pixels[((y + 1) * sampleCanvas.width + x) * 4 + 1] + pixels[((y + 1) * sampleCanvas.width + x) * 4 + 2]) / 3;
          const contrast = Math.abs(left - right) + Math.abs(up - down);
          const darkness = 255 - brightness;
          const shouldDraw = a > 20 && (contrast > 26 || darkness > 70 || Math.random() < darkness / 950);

          if (shouldDraw) {
            points.push({
              x: x / sampleCanvas.width,
              y: y / sampleCanvas.height,
              darkness,
              contrast,
              hue: `rgba(${Math.round(r * 0.45)}, ${Math.round(g * 0.45)}, ${Math.round(b * 0.45)}, `,
              length: 2 + Math.random() * 7,
              angle: Math.random() * Math.PI * 2
            });
          }
        }
      }

      state.points = points.sort((a, b) => (b.contrast + b.darkness * 0.5) - (a.contrast + a.darkness * 0.5));
      state.startedAt = 0;
      drawFrame(0);
      state.animationId = requestAnimationFrame(animateSketch);
    }

    function scheduleSound() {
      if (state.soundScheduled) return;
      state.soundScheduled = true;
      clearTimeout(state.soundTimerId);
      monkeySound.pause();
      monkeySound.currentTime = 0;
      state.soundTimerId = setTimeout(() => {
        monkeySound.currentTime = 0;
        monkeySound.play().catch(() => {
          state.soundBlocked = true;
        });
      }, soundDelay);
    }

    function drawFrame(progress) {
      const { width, height } = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#f7f9fb";
      ctx.fillRect(0, 0, width, height);

      const sketchProgress = Math.min(1, progress / 0.82);
      const strokeCount = Math.floor(state.points.length * sketchProgress);

      for (let i = 0; i < strokeCount; i++) {
        drawStroke(state.points[i], i / state.points.length);
      }

      ctx.globalAlpha = 0.14 + Math.min(0.86, progress * 1.2);
      ctx.drawImage(state.image, state.imageRect.x, state.imageRect.y, state.imageRect.width, state.imageRect.height);

      ctx.globalAlpha = 1;
    }

    function animateSketch(timestamp) {
      if (!state.startedAt) {
        state.startedAt = timestamp;
        scheduleSound();
      }

      const progress = Math.min(1, (timestamp - state.startedAt) / sketchDuration);
      drawFrame(progress);

      if (progress < 1) {
        state.animationId = requestAnimationFrame(animateSketch);
        return;
      }

      state.animationId = 0;
    }

    function drawStroke(point, progress) {
      const rect = state.imageRect;
      const x = rect.x + point.x * rect.width;
      const y = rect.y + point.y * rect.height;
      const strength = Math.min(0.8, 0.18 + point.darkness / 255 + point.contrast / 260);
      const length = point.length * (1 + progress * 0.7);
      const dx = Math.cos(point.angle) * length;
      const dy = Math.sin(point.angle) * length;

      ctx.beginPath();
      ctx.strokeStyle = `${point.hue}${strength})`;
      ctx.lineWidth = Math.max(0.5, Math.min(2.4, point.contrast / 65));
      ctx.moveTo(x - dx, y - dy);
      ctx.quadraticCurveTo(x + Math.sin(point.angle) * 2, y + Math.cos(point.angle) * 2, x + dx, y + dy);
      ctx.stroke();
    }

    function loadImage() {
      if (!monkeyImage.complete || !monkeyImage.naturalWidth) {
        drawEmptyState();
        return;
      }

      state.image = monkeyImage;
      prepareSketch(monkeyImage);
    }

    restartButton.addEventListener("click", () => {
      if (!state.image) {
        loadImage();
        return;
      }
      prepareSketch(state.image);
    });

    window.addEventListener("pointerdown", () => {
      if (!state.soundBlocked) return;
      state.soundBlocked = false;
      monkeySound.currentTime = 0;
      monkeySound.play().catch(() => {
        state.soundBlocked = true;
      });
    });

    for (const eventName of ["dragover", "drop"]) {
      window.addEventListener(eventName, (event) => {
        event.preventDefault();
      });
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    if (monkeyImage.complete) {
      loadImage();
    } else {
      monkeyImage.addEventListener("load", loadImage, { once: true });
      monkeyImage.addEventListener("error", drawEmptyState, { once: true });
    }
  </script>
</body>
</html>
